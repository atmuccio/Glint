name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npx nx build ui

      - name: Verify package (dry run)
        working-directory: dist/libs/ui
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: dist/libs/ui
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    name: Discord Notification
    needs: publish
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        run: |
          if [ "${{ needs.publish.result }}" = "success" ]; then
            COLOR=3066993
            TITLE="Release Published"
            DESCRIPTION="@glint-ng/core ${{ github.event.release.tag_name }} has been published to npm."
          else
            COLOR=15158332
            TITLE="Release Failed"
            DESCRIPTION="@glint-ng/core ${{ github.event.release.tag_name }} publish failed. Check the workflow logs."
          fi

          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"$TITLE\",
              \"description\": \"$DESCRIPTION\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Version\", \"value\": \"\`${{ github.event.release.tag_name }}\`\", \"inline\": true},
                {\"name\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"inline\": true}
              ],
              \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "${{ secrets.DISCORD_WEBHOOK }}"
