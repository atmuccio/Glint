name: Bug Report
description: Report a bug in Glint UI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Import component '...'
        2. Set input '...' to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Link to a StackBlitz, CodeSandbox, or GitHub repo that reproduces the issue.
      placeholder: https://stackblitz.com/edit/...

  - type: input
    id: glint-version
    attributes:
      label: Glint UI Version
      placeholder: 0.0.1
    validations:
      required: true

  - type: input
    id: angular-version
    attributes:
      label: Angular Version
      placeholder: 21.x.x
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser / OS
      placeholder: "Chrome 130 / Windows 11"
